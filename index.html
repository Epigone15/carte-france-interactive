<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🇫🇷 Départements (clean)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

.panel {
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    z-index:1000;
}

.palette {
    display:flex;
    gap:5px;
    margin-top:5px;
}

.color {
    width:25px;
    height:25px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid black;
}

.active {
    border:3px solid red;
}
</style>
</head>

<body>

<div class="panel">
<b>Couleurs</b>
<div id="palette" class="palette"></div>
<br>
<button onclick="eraseMode()">Gomme</button>
<button onclick="resetMap()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([46.5,2.5], 6);

// fond clair (important)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// couleurs
const colors = ["red","blue","green","orange","purple","yellow"];

let selectedColor = colors[0];
let erase = false;

// sauvegarde
const saved = JSON.parse(localStorage.getItem("deps") || "{}");

// palette UI
const palette = document.getElementById("palette");

colors.forEach(c=>{
    const el=document.createElement("div");
    el.className="color";
    el.style.background=c;

    el.onclick=()=>{
        erase=false;
        selectedColor=c;
        document.querySelectorAll(".color").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");
    };

    palette.appendChild(el);
});

palette.children[0].classList.add("active");

function eraseMode(){ erase=true; }
function resetMap(){
    localStorage.clear();
    location.reload();
}

// style des départements
function style(feature){
    return {
        fillColor: saved[feature.properties.code] || "#dddddd",
        weight:1,
        color:"#333",
        fillOpacity:0.7
    };
}

// interaction
function onEach(feature, layer){
    const code = feature.properties.code;

    layer.on("click", ()=>{
        if(erase){
            delete saved[code];
        } else {
            saved[code] = selectedColor;
        }

        localStorage.setItem("deps", JSON.stringify(saved));

        layer.setStyle({
            fillColor: saved[code] || "#dddddd"
        });
    });

    layer.bindTooltip(feature.properties.nom);
}

// 🔥 GEOJSON FIABLE (France métropolitaine)
fetch("https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson")
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: style,
        onEachFeature: onEach
    }).addTo(map);
});
</script>

</body>
</html>
