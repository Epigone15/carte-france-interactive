<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇫🇷 Départements interactifs</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

#map { height: 100vh; }

.panel {
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(15,23,42,0.95);
    padding:15px;
    border-radius:12px;
    z-index:1000;
}

.palette {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
}

.color {
    width:26px;
    height:26px;
    border-radius:50%;
    cursor:pointer;
}

.active { border:2px solid white; }

button {
    margin-top:10px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">
<b>🎨 Couleurs</b>
<div class="palette" id="palette"></div>
<button onclick="eraseMode()">🧽 Gomme</button>
<button onclick="resetMap()">♻️ Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([46.8,2.5], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const colors = ["#ef4444","#f97316","#eab308","#22c55e","#06b6d4","#3b82f6","#8b5cf6"];

let selectedColor = colors[0];
let erase = false;

const saved = JSON.parse(localStorage.getItem("departements")||"{}");

const palette = document.getElementById("palette");

colors.forEach(c=>{
    const el=document.createElement("div");
    el.className="color";
    el.style.background=c;
    el.onclick=()=>{
        erase=false;
        selectedColor=c;
        document.querySelectorAll(".color").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");
    }
    palette.appendChild(el);
});

palette.children[0].classList.add("active");

function eraseMode(){ erase=true; }
function resetMap(){ localStorage.clear(); location.reload(); }

function style(f){
    return {
        fillColor: saved[f.properties.code] || "#1e293b",
        weight:1,
        color:"#64748b",
        fillOpacity:0.8
    }
}

function click(e){
    const code = e.target.feature.properties.code;
    if(erase) delete saved[code];
    else saved[code]=selectedColor;
    
    localStorage.setItem("departements", JSON.stringify(saved));
    e.target.setStyle({ fillColor: saved[code] || "#1e293b" });
}

function onEach(f,l){
    l.on({
        click: click,
        mouseover: e=>e.target.setStyle({weight:2,color:"#fff"}),
        mouseout: e=>geo.resetStyle(e.target)
    });
    l.bindTooltip(f.properties.nom);
}

let geo;

fetch("https://france-geojson.gregoiredavid.fr/repo/departements.geojson")
.then(r=>r.json())
.then(data=>{
    geo = L.geoJSON(data,{style,onEachFeature:onEach}).addTo(map);
});

map.on("zoomend", () => {
    if(map.getZoom() > 10 && !window.communesLoaded){
        window.communesLoaded = true;
        
        fetch("https://france-geojson.gregoiredavid.fr/repo/communes.geojson")
        .then(r=>r.json())
        .then(data=>{
            L.geoJSON(data, {
                style: {
                    color:"#888",
                    weight:0.3,
                    fillOpacity:0
                }
            }).addTo(map);
        });
    }
});
</script>

</body>
</html>
